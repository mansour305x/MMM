version: "3.9"
services:
  postgres:
    image: postgres:17
    container_name: mmm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: mmm
      POSTGRES_PASSWORD: mmm
      POSTGRES_DB: mmm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro

  redis:
    image: redis:7.4
    container_name: mmm-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
