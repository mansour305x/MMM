services:
  # PostgreSQL Database
  - type: pserv
    name: mmm-postgres
    runtime: docker
    env: postgresql
    plan: free
    ipAllowList: []
    envVars:
      - key: POSTGRES_USER
        value: mmm
      - key: POSTGRES_PASSWORD
        value: mmm_secure_pass_change_me
      - key: POSTGRES_DB
        value: mmm

  # Redis Cache
  - type: pserv
    name: mmm-redis
    runtime: docker
    image: redis:7.4
    plan: free
    envVars: []

  # Backend API Server
  - type: web
    name: mmm-api
    runtime: node
    plan: free
    buildCommand: cd server && npm install && npm run build
    startCommand: cd server && node dist/src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: HOST
        value: 0.0.0.0
      - key: JWT_SECRET
        sync: false
      - key: REFRESH_SECRET
        sync: false
      - key: DATABASE_URL
        fromService:
          type: pserv
          name: mmm-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: pserv
          name: mmm-redis
          property: connectionString
      - key: CORS_ORIGIN
        value: https://mmm-frontend.onrender.com
      - key: SMS_PROVIDER
        value: mock
      - key: SMS_SENDER_ID
        value: MMM
      - key: RATE_LIMIT_MAX
        value: "100"
      - key: RATE_LIMIT_WINDOW
        value: "1 minute"

  # Frontend Static Site
  - type: static_site
    name: mmm-frontend
    buildCommand: echo "Static site"
    staticPublishPath: ./
    envVars: []
